server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache assets statiques (JS/CSS/images)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy vers l'API server
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Routes multi-page (chaque route a son propre HTML)
    location = /roster        { try_files /roster.html =404; }
    location = /join          { try_files /join.html =404; }
    location = /rules         { try_files /rules.html =404; }
    location = /terms         { try_files /terms.html =404; }
    location = /privacy       { try_files /privacy.html =404; }
    location = /players-login { try_files /players-login.html =404; }
    location = /meonix        { try_files /meonix.html =404; }
    location = /profile       { try_files /profile.html =404; }

    # SPA fallback pour toutes les autres routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
