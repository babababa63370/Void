kind = "web"
previewPath = "/"
title = "Void Esport"
version = "1.0.0"
id = "artifacts/void-esport"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25439

[services.development]
run = "pnpm --filter @workspace/void-esport run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/void-esport", "run", "build" ]
publicDir = "artifacts/void-esport/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/roster"
to = "/roster.html"

[[services.production.rewrites]]
from = "/join"
to = "/join.html"

[[services.production.rewrites]]
from = "/rules"
to = "/rules.html"

[[services.production.rewrites]]
from = "/terms"
to = "/terms.html"

[[services.production.rewrites]]
from = "/privacy"
to = "/privacy.html"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25439"
BASE_PATH = "/"
